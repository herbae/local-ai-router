ollama:
  base_url: "http://ollama:11434"
  model: "gemma4:e4b"

claude:
  model: "claude-sonnet-4-20250514"

llm_classifier:
  # When enabled, prompts that pass all heuristic checks (would default to
  # local) get a second-stage check: ask the local model itself whether the
  # prompt needs cloud. Adds latency (~300-500ms) but catches semantic
  # complexity that regex patterns miss. Falls back to local on any error.
  enabled: true
  timeout: 10.0

classifier:
  max_local_length: 500
  # Prefixes (start of message) that always route locally regardless of
  # length or code patterns. Useful for Open WebUI's auto-generated
  # title/tag tasks so they don't burn cloud credits.
  force_local_prefixes:
    - "### Task:"
  code_patterns:
    - "```"
    - "def "
    - "class "
    - "import "
    - "function "
    - "const "
    - "var "
    - "SELECT "
    - "CREATE TABLE"
    - "async "
    - "await "
